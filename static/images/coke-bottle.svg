<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 280" fill="none">
  <!-- Bottle shape - classic contour style -->
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="100%" style="stop-color:#f40009"/>
    </linearGradient>
  </defs>
  <!-- Cap -->
  <rect x="42" y="0" width="36" height="18" rx="2" fill="#c00"/>
  <rect x="44" y="2" width="32" height="6" rx="1" fill="url(#glass)"/>
  <!-- Neck -->
  <path d="M48 18 L48 50 L54 50 L54 18 Z" fill="url(#liquid)"/>
  <path d="M66 18 L66 50 L72 50 L72 18 Z" fill="url(#liquid)"/>
  <path d="M54 18 L54 50 L66 50 L66 18 Z" fill="#f40009"/>
  <path d="M50 20 L60 50 L70 50 L70 20 L60 18 Z" fill="url(#glass)" opacity="0.5"/>
  <!-- Shoulder to body -->
  <path d="M 48 50 Q 30 55 32 85 L 32 260 Q 32 275 60 275 Q 88 275 88 260 L 88 85 Q 90 55 72 50 Z" fill="#f40009" stroke="#c00" stroke-width="1"/>
  <path d="M 35 80 L 85 80 L 85 255 L 35 255 Z" fill="url(#liquid)"/>
  <path d="M 60 52 L 60 275" stroke="url(#glass)" stroke-width="8" opacity="0.4"/>
  <!-- White curve (logo band suggestion) -->
  <path d="M 38 130 Q 60 125 82 130" stroke="#fff" stroke-width="14" fill="none" stroke-linecap="round"/>
</svg>
